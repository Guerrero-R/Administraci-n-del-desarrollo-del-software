<div class="ss-flip" style="--d:${delay}s" tabindex="0" role="group" aria-label="Flashcard $index">
  <div class="ss-flip-inner">
    <div class="ss-face ss-front">
      <span class="ss-tag">Flashcard $index · Frente</span>
      <div class="ss-content">$front</div>
    </div>
    <div class="ss-face ss-back">
      <span class="ss-tag">Reverso</span>
      <div class="ss-content">$back</div>
    </div>
  </div>
</div>
